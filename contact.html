<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Unity Health</title>
  <link rel="stylesheet" href="Contact.css">
</head>
<body>

  <header class="navbar">
    <a href="Home.html" class="logo">
      <img src="Pharmacy_Logo.jpeg" alt="Unity Health Logo">
    </a>

    <nav>
      <a href="Home.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="products.html">Products</a>
      <a href="info.html">Info</a>
      <a href="feedback.html">Feedback</a>
      <a href="gallery.html">Gallery</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <header class="page-title">
    <h1>Contact Us</h1>
  </header>

  <main class="container">

    <div class="contact-sections">

      <section class="contact-info">
        <h2>Get in Touch</h2>
        <p><strong>Phone:</strong> +501 662-2631</p>
        <p><strong>Email:</strong> unityhealth_bas@gmail.com</p>
        <p><strong>Address:</strong> 456 Main Street, Corozal District</p>
      </section>

      <section class="contact-form">
        <h2>Sign In</h2>
        <form>
          <label for="fname">First Name:</label>
          <input type="text" id="fname" name="fname" required>

          <label for="lname">Last Name:</label>
          <input type="text" id="lname" name="lname" required>

          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>

          <label for="message">Message:</label>
          <textarea id="message" name="message" rows="5" required></textarea>

          <button type="submit">Submit</button>
        </form>
      </section>

    </div>

    <section class="map">
      <h2>Find Us</h2>
      <iframe 
        src="https://www.google.com/maps?q=456+Main+Street,+Belize+City&output=embed" 
        width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy">
      </iframe>
    </section>

  </main>

</body>
</html>
